services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: safety
      POSTGRES_PASSWORD: safety
      POSTGRES_DB: safety_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safety"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
