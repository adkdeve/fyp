services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: safety
      POSTGRES_PASSWORD: safety
      POSTGRES_DB: safety_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safety"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
    image: construction-safety-backend:local
    environment:
      DATABASE_URL: postgresql+psycopg2://safety:safety@db:5432/safety_db
      JWT_SECRET: change-me-to-a-long-random-string
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 14
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      MEDIA_DIR: /app/media
      MODEL_PATH: /app/model.pt
      DETECTOR: mock
      RUN_MIGRATIONS: "true"
    ports:
      - "8000:8000"
    volumes:
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  media:
