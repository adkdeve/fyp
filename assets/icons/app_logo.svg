<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Simplified logo better suited for app icons -->
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A3B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B7FA8;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="helmetGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9BC4BC;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#mainGradient)"/>

  <!-- Shield Background -->
  <path d="M 256 80 L 400 140 L 400 280 C 400 360 370 420 256 470 C 142 420 112 360 112 280 L 112 140 Z"
      fill="#5B4A7D"
      opacity="0.6"/>

  <!-- Main Shield -->
  <path d="M 256 100 L 380 150 L 380 270 C 380 340 355 395 256 440 C 157 395 132 340 132 270 L 132 150 Z"
      fill="url(#helmetGradient)"
      opacity="0.95"/>

  <!-- Hard Hat Construction Symbol -->
  <g transform="translate(256, 240)">
    <!-- Hard Hat Main Body -->
    <path d="M -70 0 L -70 -40 Q -70 -70 -40 -80 L 40 -80 Q 70 -70 70 -40 L 70 0 Q 70 10 60 15 L -60 15 Q -70 10 -70 0 Z"
        fill="#4A3B6B"/>

    <!-- Hard Hat Top Ridge -->
    <ellipse cx="0" cy="-80" rx="50" ry="20" fill="#4A3B6B"/>

    <!-- Hard Hat Brim -->
    <ellipse cx="0" cy="15" rx="80" ry="15" fill="#4A3B6B" opacity="0.8"/>

    <!-- Center Stripe -->
    <rect x="-5" y="-80" width="10" height="90" fill="#9BC4BC"/>

    <!-- Vent Holes -->
    <circle cx="-30" cy="-50" r="5" fill="#9BC4BC"/>
    <circle cx="30" cy="-50" r="5" fill="#9BC4BC"/>
  </g>

  <!-- AI Monitoring Eye -->
  <g transform="translate(256, 370)">
    <!-- Eye Background -->
    <ellipse cx="0" cy="0" rx="50" ry="30" fill="#4A3B6B" opacity="0.7"/>
    <!-- Iris -->
    <circle cx="0" cy="0" r="20" fill="#9BC4BC"/>
    <!-- Pupil -->
    <circle cx="0" cy="0" r="12" fill="#4A3B6B"/>
    <!-- Highlight -->
    <circle cx="-5" cy="-5" r="5" fill="#FFFFFF"/>

    <!-- Scanning Lines -->
    <line x1="-60" y1="0" x2="-50" y2="0" stroke="#9BC4BC" stroke-width="2" opacity="0.6"/>
    <line x1="50" y1="0" x2="60" y2="0" stroke="#9BC4BC" stroke-width="2" opacity="0.6"/>
    <line x1="-55" y1="-10" x2="-45" y2="-5" stroke="#9BC4BC" stroke-width="2" opacity="0.4"/>
    <line x1="45" y1="-5" x2="55" y2="-10" stroke="#9BC4BC" stroke-width="2" opacity="0.4"/>
    <line x1="-55" y1="10" x2="-45" y2="5" stroke="#9BC4BC" stroke-width="2" opacity="0.4"/>
    <line x1="45" y1="5" x2="55" y2="10" stroke="#9BC4BC" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Corner Tech Elements -->
  <g opacity="0.4">
    <!-- Top Left -->
    <path d="M 60 60 L 90 60 L 90 90" stroke="#9BC4BC" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="60" cy="60" r="4" fill="#9BC4BC"/>

    <!-- Top Right -->
    <path d="M 452 60 L 422 60 L 422 90" stroke="#9BC4BC" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="452" cy="60" r="4" fill="#9BC4BC"/>

    <!-- Bottom Left -->
    <path d="M 60 452 L 90 452 L 90 422" stroke="#9BC4BC" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="60" cy="452" r="4" fill="#9BC4BC"/>

    <!-- Bottom Right -->
    <path d="M 452 452 L 422 452 L 422 422" stroke="#9BC4BC" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="452" cy="452" r="4" fill="#9BC4BC"/>
  </g>

  <!-- Alert Badge (Top Right) -->
  <g transform="translate(410, 102)">
    <circle cx="0" cy="0" r="35" fill="#9BC4BC"/>
    <path d="M 0 -20 L 5 5 L -5 5 Z" fill="#4A3B6B"/>
    <circle cx="0" cy="12" r="3" fill="#4A3B6B"/>
  </g>
</svg>
