apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-media
  namespace: construction-safety
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: construction-safety
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: docker.io/YOUR_DOCKERHUB_USERNAME/construction-safety-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: safety-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: safety-secrets
                  key: jwt-secret
            - name: JWT_ALGORITHM
              value: HS256
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: "60"
            - name: REFRESH_TOKEN_EXPIRE_DAYS
              value: "14"
            - name: CORS_ORIGINS
              value: http://localhost:3000,http://localhost:5173
            - name: MEDIA_DIR
              value: /app/media
            - name: MODEL_PATH
              value: /app/model.pt
            - name: DETECTOR
              value: mock
            - name: RUN_MIGRATIONS
              value: "true"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: backend-media
              mountPath: /app/media
      volumes:
        - name: backend-media
          persistentVolumeClaim:
            claimName: backend-media
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: construction-safety
spec:
  type: LoadBalancer
  selector:
    app: backend
  ports:
    - name: http
      port: 80
      targetPort: 8000
