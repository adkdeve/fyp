apiVersion: v1
kind: Secret
metadata:
  name: safety-secrets
  namespace: construction-safety
type: Opaque
stringData:
  postgres-user: safety
  postgres-password: change-this-postgres-password
  postgres-db: safety_db
  database-url: postgresql+psycopg2://safety:change-this-postgres-password@postgres:5432/safety_db
  jwt-secret: change-this-to-a-long-random-production-secret
